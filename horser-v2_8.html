<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Racing</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to the Horse Racing Game!</h1>
    </header>
    <main>
        <section id="race-info">
            <h2>Race Information</h2>
            <p id="race-description">Place your bets and watch the race unfold!</p>
            <button id="start-race-btn">Start Race</button>
        </section>
        <section id="bets">
            <h2>Place Your Bets</h2>
            <form id="bet-form">
                <label for="horse-select">Choose a horse:</label>
                <select id="horse-select" name="horse">
                    <option value="horse1">Horse 1</option>
                    <option value="horse2">Horse 2</option>
                    <option value="horse3">Horse 3</option>
                    <option value="horse4">Horse 4</option>
                </select>
                <label for="bet-amount">Bet Amount:</label>
                <input type="number" id="bet-amount" name="amount" min="1" required>
                <button type="submit">Place Bet</button>
            </form>
        </section>
        <section id="race-results">
            <h2>Race Results</h2>
            <div id="results-table">
                <p>No results yet.</p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Sti4466 - All rights reserved.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
